buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        //implementation "org.flywaydb:flyway-database-postgresql"
        classpath "org.flywaydb:flyway-database-postgresql:12.1.1"
    }
}

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'java'
    id 'org.springframework.boot' version '4.0.0'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'org.flywaydb.flyway' version "12.1.1"
}

group='org.recsys'
version='0.0.1'


repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // This dependency is used by the application.
    implementation libs.guava

    // Spring Boot Starter
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    // Advanced Postgres types
    implementation 'io.hypersistence:hypersistence-utils-hibernate-71:3.15.2'
    implementation 'org.hibernate.orm:hibernate-vector:7.1.8.Final'
    // Lucene for TF-IDF
    implementation 'org.apache.lucene:lucene-core:10.4.0'
    implementation 'org.apache.lucene:lucene-analysis-common:10.4.0'

    // Spring Boot Developer Tools: Provides fast application restarts and live reloading during development.
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    
    // Lombok annotation
    compileOnly "org.projectlombok:lombok:1.18.44"
    annotationProcessor "org.projectlombok:lombok:1.18.44"

    implementation 'org.mapstruct:mapstruct:1.6.3'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.6.3'

    // Flyway migration
    implementation 'org.flywaydb:flyway-core:12.1.1'
    implementation 'org.flywaydb:flyway-database-postgresql:12.1.1'
    // Postgres driver
    runtimeOnly 'org.postgresql:postgresql'
    // .env
    implementation 'io.github.cdimascio:dotenv-java:3.0.0'
    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'
    

    /// --- TESTING ---
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    // Spring Boot Starter Test: Provides libraries for testing Spring Boot applications.
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testImplementation 'org.springframework.security:spring-security-test'
    // Test DB that works for pgvector postgres
    testImplementation 'org.testcontainers:postgresql:1.19.0'
    testImplementation 'org.testcontainers:junit-jupiter:1.19.0'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
}

flyway {
    url = 'jdbc:pgvector/pgvector:pg16://[::1]:5432/crsdb' //+System.getenv('POSTGRES_DB')
    user = System.getenv('POSTGRES_USER')
    password = System.getenv('POSTGRES_PASSWORD')
}

flywayMigrate.dependsOn classes

test {
  useJUnitPlatform()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.annotationProcessorPath = configurations.annotationProcessor
}