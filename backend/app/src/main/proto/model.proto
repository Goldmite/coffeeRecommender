edition = "2024";

package org.recsys.proto;

option java_outer_classname = "ModelProtos";

message TrainedModelProto {
    
    repeated float user_factors = 1;
    repeated float coffee_factors = 2;
    repeated float user_biases = 3;
    repeated float coffee_biases = 4;
    repeated float user_alphas = 5;
    repeated float coffee_bin_biases = 6;
    repeated float user_timestamp_means = 7;
    
    int32 k = 8;
    double beta = 9;
    float global_mean = 10;
    int64 min_timestamp = 11;
    
    map<int64, int32> user_id_to_idx = 12;
    map<int64, int32> coffee_id_to_idx = 13;
}