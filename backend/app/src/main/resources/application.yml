spring:
  #profiles: 
  #  active: "test"
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

app:
  cors:
    allowed-origin: http://localhost:5173
  jwt:
    secret: ${JWT_SECRET:staticfallbacksecretkeyfordevelopment256bit}
    expiration: 86400000 # 24 hours
  testdata:
    seed: 22

recommendation:
  weights:
    roast-level: 2.0
    sca-score: 1.1
    altitude: 0.6
    acidity: 1.8
    body: 1.2
    aftertaste: 1.2
    sweetness: 1.2
    bitterness: 1.0
    single-origin: 1.1
    fruity: 2.0
    floral: 2.0
    nutty-cocoa: 2.0
    sweet: 2.0
    spices: 1.5
    vegetal: 1.4
    sour: 1.4
    processing: 1.0
    origins: 0.5
  mf:
    latent-factors: 50
    learning-rate: 0.015
    regularization: 0.02
    epochs: 100
    beta: 0.4
  hybrid:
    cf: 0.8
    steepness: 0.4
    inflection-point: 10
    sensitivity: 0.3