spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Automatically creates the schema based on @Entity classes
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

app:
  jwt:
    secret: staticfallbacksecretkeyfordevelopment256bit
    expiration: 86400000 # 24 hours