spring:
  datasource:
    # DB_CLOSE_DELAY=-1 keeps the data alive as long as the JVM is running
    url: jdbc:h2:mem:h2db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # Automatically creates the schema based on @Entity classes
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: staticfallbacksecretkeyfordevelopment256bit
    expiration: 86400000 # 24 hours